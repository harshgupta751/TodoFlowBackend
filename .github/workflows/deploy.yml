name: Build and Deploy Dockerized Backend

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # STEP 1 → Clone Repository
      - name: Checkout Repository
        uses: actions/checkout@v2

      # STEP 2 → Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # STEP 3 → Build & Push Docker Image
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v2
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: harshgupta100/taskflow-backend:latest

      # STEP 4 → Verify Image
      - name: Verify Pushed Image
        run: docker pull harshgupta100/taskflow-backend:latest

      # STEP 5 → Deploy to EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            sudo docker pull harshgupta100/taskflow-backend:latest
            
            sudo docker stop taskflow-backend || true
            
            sudo docker rm taskflow-backend || true
            
            sudo docker run -d \
              --name taskflow-backend \
              -p 3000:3000 \
              -e MONGO_URI='${{ secrets.MONGOOSE_URL }}' \
              -e JWT_SECRET='${{ secrets.JWT_SECRET }}' \
              -e PORT='${{ secrets.PORT }}' \
              harshgupta100/taskflow-backend:latest
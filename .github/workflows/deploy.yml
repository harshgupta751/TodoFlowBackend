name: Dockerized Backend CI-CD

on:
  push:
    branches:
      - main

jobs:

  ci:
    runs-on: ubuntu-latest

    steps:
      # STEP 1 → Clone Repo
      - name: Checkout Repository
        uses: actions/checkout@v2

      # STEP 2 → Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22

      # STEP 3 → Install Dependencies
      - name: Install Dependencies
        run: npm install

      # STEP 4 → Run Tests
      - name: Run Tests
        run: npm test

      # STEP 5 → Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # STEP 6 → Build & Push Docker Image
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v2
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: harshgupta100/taskflow-backend:latest

      # STEP 7 → Verify Docker Image
      - name: Verify Docker Image
        run: docker pull harshgupta100/taskflow-backend:latest


  cd:
    runs-on: ubuntu-latest

    needs: ci

    steps:
      # STEP 1 → Deploy to EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            sudo docker pull harshgupta100/taskflow-backend:latest
            
            sudo docker stop taskflow-backend || true
            
            sudo docker rm taskflow-backend || true
            
            sudo docker run -d \
              --name taskflow-backend \
              -p 3000:3000 \
              -e MONGOOSE_URL='${{ secrets.MONGOOSE_URL }}' \
              -e JWT_SECRET='${{ secrets.JWT_SECRET }}' \
              -e PORT='${{ secrets.PORT }}' \
              harshgupta100/taskflow-backend:latest

            sleep 5

            curl localhost:3000/health


            